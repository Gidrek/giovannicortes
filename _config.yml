title: Giovanni Cortes
site_autor: Giovanni Cortes
email: 
description: > # this means to ignore newlines until "baseurl:"
  Creating games and apps
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://giovannicortes.com" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: gidrekdev
github_username:  gidrek
youtube_channel: 

# Pagination (used by the blog)
pagination:
  enabled: true
  debug: false

  per_page: 24
  sort_field: "date"
  sort_reverse: true
  # Controls how the pagination trail for the paginated pages look like.
  trail:
    before: 2
    after: 2

  title: ":title - Page :num"
  permalink: "/:num/"
  category: "posts"
  tag: ""
  locale: ""

permalink: /:title/

# Build settings
markdown: kramdown
markdown_ext: md
plugins:
  - jekyll-feed
  - jekyll-paginate-v2
exclude:
  - Gemfile
  - Gemfile.lock
  - giovannicortes.sublime-workspace
  - giovannicortes.sublime-project
  - vendor
  - .gitignore
  - README.md
include:
  - _pages